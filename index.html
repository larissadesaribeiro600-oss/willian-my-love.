<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Willian ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="particles"></div>

<section class="hero">

<h1>Willian ❤️</h1>

<p>
Uma playlist sobre nós.
</p>

<button onclick="scrollToSection()">
Entrar
</button>

</section>

<section class="contador">

<h2>Estamos juntos há</h2>

<div id="tempo"></div>

</section>

<section class="spotify">

<h2>Nossa Playlist</h2>

<div class="song">
🎵 Willian My Love
</div>

<div class="song">
🎵 Te Vivo - Luan Santana
</div>

<audio controls>
<source src="music/te-vivo.mp3">
</audio>

</section>

<section class="galeria">

<h2>Nossos Momentos</h2>

<div class="grid">

<img src="images/foto1.jpg">
<img src="images/foto2.jpg">
<img src="images/foto3.jpg">
<img src="images/foto4.jpg">

</div>

</section>

<section class="carta">

<h2>💌 Para Você</h2>

<div id="texto"></div>

</section>

<section class="roleta">

<h2>🎡 Roleta do Amor</h2>

<div id="resultado">
Clique para girar
</div>

<button onclick="girar()">
Girar
</button>

</section>

<section class="final">

<h1>
Eu escolheria você.
</h1>

<p>
Em qualquer cidade.
Em qualquer distância.
Em qualquer vida.
</p>

</section>

<script src="script.js"></script>

</body>
</html>
